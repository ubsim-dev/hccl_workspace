const detailGrid=document.getElementById('detail-grid');const fields=[['taskId','Task'],['flow','Flow'],['slot','Slot'],['priority','Priority'],['start','Start'],['end','End'],['duration','Duration'],['size','Data'],['throughput','Throughput']];function selectTask(node){document.querySelectorAll('.task.selected').forEach(el=>el.classList.remove('selected'));node.classList.add('selected');detailGrid.innerHTML=fields.map(([key,label])=>`<div class="detail-item"><div class="detail-label">${label}</div><div class="detail-value">${node.dataset[key]||'-'}</div></div>`).join('');}document.querySelectorAll('.task').forEach(node=>{node.addEventListener('click',()=>selectTask(node));node.addEventListener('keydown',event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();selectTask(node);}});});
